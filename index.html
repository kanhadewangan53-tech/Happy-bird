<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flappy Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    h1 {
      color: #f5d442;
      font-size: 2rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
      text-shadow: 0 0 20px #f5d44288;
    }

    #game-wrapper {
      position: relative;
    }

    canvas {
      display: block;
      border-radius: 16px;
      border: 3px solid #f5d44255;
      box-shadow: 0 0 40px #f5d44230;
    }

    #ui-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #score-display {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.4rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 2px 2px 0 #333, 0 0 12px #f5d44288;
      letter-spacing: 2px;
    }

    #start-screen, #gameover-screen {
      background: rgba(10, 10, 30, 0.82);
      border-radius: 16px;
      padding: 28px 40px;
      text-align: center;
      backdrop-filter: blur(6px);
      border: 1.5px solid #f5d44240;
    }

    .screen-title {
      font-size: 2rem;
      color: #f5d442;
      font-weight: 900;
      margin-bottom: 8px;
      text-shadow: 0 0 16px #f5d44266;
    }

    .screen-sub {
      font-size: 1rem;
      color: #ccc;
      margin-bottom: 18px;
    }

    .btn {
      background: #f5d442;
      color: #1a1a2e;
      border: none;
      padding: 12px 36px;
      font-size: 1.1rem;
      font-weight: 800;
      border-radius: 50px;
      cursor: pointer;
      pointer-events: all;
      letter-spacing: 1px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px #f5d44244;
    }
    .btn:hover { transform: scale(1.07); box-shadow: 0 6px 28px #f5d44266; }
    .btn:active { transform: scale(0.97); }

    #best-score {
      color: #f5d442;
      font-size: 1rem;
      margin-top: 12px;
      letter-spacing: 1px;
    }

    #gameover-screen { display: none; }

    .final-score {
      font-size: 1.3rem;
      color: #fff;
      margin-bottom: 6px;
    }
    .hint {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>🐦 Flappy Bird</h1>

  <div id="game-wrapper">
    <canvas id="canvas" width="380" height="560"></canvas>

    <div id="ui-overlay">
      <div id="score-display">0</div>

      <div id="start-screen">
        <div class="screen-title">🐦 Flappy Bird</div>
        <div class="screen-sub">Tap or press Space to fly!</div>
        <button class="btn" id="start-btn">▶ Start Game</button>
        <div id="best-score">Best: 0</div>
      </div>

      <div id="gameover-screen">
        <div class="screen-title">💀 Game Over!</div>
        <div class="final-score" id="final-score-text">Score: 0</div>
        <div id="best-score-go">Best: 0</div>
        <br/>
        <button class="btn" id="restart-btn">🔄 Restart</button>
        <div class="hint">Space / Tap to fly</div>
      </div>
    </div>
  </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;

// ─── Game State ───────────────────────────────────────────────
let state = 'start'; // 'start' | 'playing' | 'dead'
let score = 0;
let bestScore = 0;
let animId;

// ─── Bird ─────────────────────────────────────────────────────
const BIRD = {
  x: 80, y: H / 2,
  r: 18,
  vel: 0,
  gravity: 0.45,
  flapPower: -8.5,
  maxFall: 10,
  angle: 0,
  wingAngle: 0,
  wingDir: 1,
  reset() {
    this.y = H / 2;
    this.vel = 0;
    this.angle = 0;
    this.wingAngle = 0;
  },
  flap() {
    this.vel = this.flapPower;
  },
  update() {
    this.vel = Math.min(this.vel + this.gravity, this.maxFall);
    this.y += this.vel;
    this.angle = Math.max(-25, Math.min(90, this.vel * 4));
    this.wingAngle += 0.3 * this.wingDir;
    if (Math.abs(this.wingAngle) > 0.5) this.wingDir *= -1;
  },
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate((this.angle * Math.PI) / 180);

    // Body (yellow circle)
    ctx.fillStyle = '#f5d442';
    ctx.shadowColor = '#f5d44288';
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.ellipse(0, 0, this.r, this.r - 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Wing
    ctx.save();
    ctx.translate(-4, 2);
    ctx.rotate(this.wingAngle * 1.2);
    ctx.fillStyle = '#e5be20';
    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Eye white
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(8, -5, 7, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pupil
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.ellipse(10, -4, 3.5, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = '#f07020';
    ctx.beginPath();
    ctx.moveTo(14, -1);
    ctx.lineTo(24, -1);
    ctx.lineTo(24, 4);
    ctx.lineTo(14, 4);
    ctx.closePath();
    ctx.fill();

    // Cheek blush
    ctx.fillStyle = '#ff888844';
    ctx.beginPath();
    ctx.ellipse(5, 3, 5, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
};

// ─── Pipes ────────────────────────────────────────────────────
const PIPE_W = 62;
const PIPE_GAP = 155;
const PIPE_SPEED = 2.6;
let pipes = [];
let pipeTimer = 0;
const PIPE_INTERVAL = 90;

function addPipe() {
  const minY = 90;
  const maxY = H - 90 - PIPE_GAP;
  const topH = Math.floor(Math.random() * (maxY - minY) + minY);
  pipes.push({ x: W + PIPE_W, topH, passed: false });
}

function drawPipe(x, topH) {
  const capW = PIPE_W + 12;
  const capH = 24;
  const radius = 6;

  // Top pipe body
  const tGrad = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
  tGrad.addColorStop(0, '#2ecc71');
  tGrad.addColorStop(0.5, '#27ae60');
  tGrad.addColorStop(1, '#1a7a40');
  ctx.fillStyle = tGrad;
  ctx.fillRect(x, 0, PIPE_W, topH - capH);

  // Top pipe cap
  const capX = x - (capW - PIPE_W) / 2;
  ctx.fillStyle = '#27ae60';
  ctx.beginPath();
  ctx.roundRect(capX, topH - capH, capW, capH, radius);
  ctx.fill();
  ctx.strokeStyle = '#1a7a40';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Bottom pipe body
  const botTop = topH + PIPE_GAP;
  const bGrad = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
  bGrad.addColorStop(0, '#2ecc71');
  bGrad.addColorStop(0.5, '#27ae60');
  bGrad.addColorStop(1, '#1a7a40');
  ctx.fillStyle = bGrad;
  ctx.fillRect(x, botTop + capH, PIPE_W, H - botTop - capH);

  // Bottom pipe cap
  ctx.fillStyle = '#27ae60';
  ctx.beginPath();
  ctx.roundRect(capX, botTop, capW, capH, radius);
  ctx.fill();
  ctx.strokeStyle = '#1a7a40';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Pipe shine
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(x + 6, 0, 10, topH - capH);
  ctx.fillRect(x + 6, botTop + capH, 10, H - botTop - capH);
}

// ─── Background ───────────────────────────────────────────────
let bgOffset = 0;
const cloudData = [
  { x: 60, y: 60, s: 1 },
  { x: 200, y: 40, s: 0.7 },
  { x: 310, y: 80, s: 0.9 },
  { x: 100, y: 110, s: 0.6 },
  { x: 280, y: 130, s: 1.1 },
];

function drawCloud(x, y, s) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath();
  ctx.arc(0, 0, 18, 0, Math.PI * 2);
  ctx.arc(22, -6, 22, 0, Math.PI * 2);
  ctx.arc(44, 0, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBackground() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#0f3460');
  sky.addColorStop(0.6, '#16213e');
  sky.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Clouds (slow parallax)
  bgOffset = (bgOffset + 0.3) % W;
  for (const c of cloudData) {
    const cx = ((c.x - bgOffset * 0.4 + W) % (W + 80)) - 40;
    drawCloud(cx, c.y, c.s);
  }

  // Ground
  const grd = ctx.createLinearGradient(0, H - 60, 0, H);
  grd.addColorStop(0, '#5c4a1e');
  grd.addColorStop(1, '#3d2f0d');
  ctx.fillStyle = grd;
  ctx.fillRect(0, H - 60, W, 60);

  // Grass strip
  ctx.fillStyle = '#4caf50';
  ctx.fillRect(0, H - 62, W, 10);
  ctx.fillStyle = '#388e3c';
  ctx.fillRect(0, H - 55, W, 4);
}

// ─── Collision ────────────────────────────────────────────────
function checkCollision(pipe) {
  const bx = BIRD.x, by = BIRD.y, br = BIRD.r - 4;
  const px = pipe.x, topH = pipe.topH;
  const botTop = topH + PIPE_GAP;

  const inXRange = bx + br > px - 6 && bx - br < px + PIPE_W + 6;
  if (inXRange) {
    if (by - br < topH || by + br > botTop) return true;
  }
  if (by + br >= H - 62 || by - br <= 0) return true;
  return false;
}

// ─── Particles ────────────────────────────────────────────────
let particles = [];
function spawnParticles() {
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x: BIRD.x, y: BIRD.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1, color: ['#f5d442','#f07020','#fff','#ff5555'][Math.floor(Math.random()*4)]
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= 0.025;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4 * p.life + 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ─── Score display ─────────────────────────────────────────────
const scoreEl = document.getElementById('score-display');
function updateScoreDisplay() {
  scoreEl.textContent = score;
}

// ─── Flash overlay ─────────────────────────────────────────────
let flash = 0;
function drawFlash() {
  if (flash > 0) {
    ctx.fillStyle = `rgba(255,80,80,${flash})`;
    ctx.fillRect(0, 0, W, H);
    flash -= 0.06;
  }
}

// ─── Main Loop ────────────────────────────────────────────────
function loop() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  if (state === 'playing') {
    BIRD.update();

    pipeTimer++;
    if (pipeTimer >= PIPE_INTERVAL) {
      addPipe();
      pipeTimer = 0;
    }

    for (const pipe of pipes) {
      pipe.x -= PIPE_SPEED;
      drawPipe(pipe.x, pipe.topH);

      if (!pipe.passed && pipe.x + PIPE_W < BIRD.x) {
        pipe.passed = true;
        score++;
        updateScoreDisplay();
      }

      if (checkCollision(pipe)) {
        killBird();
        return;
      }
    }

    if (BIRD.y + BIRD.r >= H - 62 || BIRD.y - BIRD.r <= 0) {
      killBird();
      return;
    }

    pipes = pipes.filter(p => p.x + PIPE_W + 20 > 0);
  }

  BIRD.draw();
  updateParticles();
  drawFlash();

  animId = requestAnimationFrame(loop);
}

// ─── Kill ──────────────────────────────────────────────────────
function killBird() {
  state = 'dead';
  flash = 0.7;
  spawnParticles();

  if (score > bestScore) bestScore = score;

  document.getElementById('final-score-text').textContent = `Score: ${score}`;
  document.getElementById('best-score-go').textContent = `Best: ${bestScore}`;
  document.getElementById('best-score').textContent = `Best: ${bestScore}`;
  document.getElementById('gameover-screen').style.display = 'block';

  // Draw a few more frames for particles
  let extra = 0;
  function deathLoop() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    for (const pipe of pipes) drawPipe(pipe.x, pipe.topH);
    BIRD.draw();
    updateParticles();
    drawFlash();
    extra++;
    if (extra < 80) requestAnimationFrame(deathLoop);
  }
  deathLoop();
}

// ─── Start / Restart ─────────────────────────────────────────
function startGame() {
  cancelAnimationFrame(animId);
  score = 0;
  pipes = [];
  pipeTimer = 0;
  particles = [];
  flash = 0;
  BIRD.reset();
  state = 'playing';
  updateScoreDisplay();
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('gameover-screen').style.display = 'none';
  loop();
}

// ─── Input ────────────────────────────────────────────────────
function handleInput() {
  if (state === 'playing') BIRD.flap();
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    if (state === 'playing') handleInput();
  }
});

canvas.addEventListener('click', () => {
  if (state === 'playing') handleInput();
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'playing') handleInput();
}, { passive: false });

// ─── Idle animation on start screen ──────────────────────────
function idleLoop() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  BIRD.y = H / 2 + Math.sin(Date.now() / 400) * 14;
  BIRD.wingAngle += 0.08;
  BIRD.draw();
  if (state === 'start') requestAnimationFrame(idleLoop);
}
idleLoop();
</script>
</body>
</html>
